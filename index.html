<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Hermes · Token Courier</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
        { "imports": { "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js" } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap');
        :root {
            --void: #080a0f; --deep: #0b0e16; --surface: #1e2535;
            --gold: #c8943a; --hermes: #FFD700; --mist: #6a7a8a; --pale: #d4e0ed;
            --love: #b05870; --war: #c0382a; --forge: #c07040; --cultivation: #7a6a40;
            --wild: #5a8050; --legacy: #5a7aaa; --flow: #3a7090;
            --font-display: 'Cinzel', serif;
            --font-body: 'Crimson Pro', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--void); font-family: var(--font-body); color: var(--pale); min-height: 100vh; }
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        
        .header { text-align: center; border-bottom: 1px solid var(--surface); padding-bottom: 1rem; margin-bottom: 1.5rem; }
        .header h1 { font-family: var(--font-display); font-size: 2.2rem; color: var(--gold); letter-spacing: 3px; }
        .header-sub { font-family: var(--font-mono); font-size: 0.55rem; color: var(--mist); letter-spacing: 2px; margin-top: 0.3rem; }
        
        .status-bar { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; font-family: var(--font-mono); font-size: 0.55rem; color: var(--mist); }
        .status-bar span { color: var(--pale); font-weight: 500; }
        
        .controls { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
        button { font-family: var(--font-mono); font-size: 0.6rem; padding: 0.45rem 0.9rem; border-radius: 4px; cursor: pointer; border: 1px solid var(--surface); background: var(--deep); color: var(--pale); transition: all 0.2s; letter-spacing: 1px; }
        button:hover:not(:disabled) { background: var(--gold); color: var(--void); border-color: var(--gold); }
        button.primary { background: var(--gold); color: var(--void); border-color: var(--gold); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .spin { display: inline-block; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .domain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.6rem; margin-bottom: 1.5rem; }
        .domain-card { background: var(--deep); border: 1px solid var(--surface); border-radius: 8px; padding: 0.8rem; text-align: center; }
        .domain-card.love { border-top: 2px solid var(--love); }
        .domain-card.war { border-top: 2px solid var(--war); }
        .domain-card.forge { border-top: 2px solid var(--forge); }
        .domain-card.cultivation { border-top: 2px solid var(--cultivation); }
        .domain-card.wild { border-top: 2px solid var(--wild); }
        .domain-name { font-family: var(--font-display); font-size: 0.7rem; margin-bottom: 0.2rem; }
        .domain-count { font-family: var(--font-mono); font-size: 0.65rem; }
        .domain-god { font-family: var(--font-mono); font-size: 0.45rem; color: var(--mist); margin-top: 0.2rem; }
        
        .token-feed { background: var(--deep); border: 1px solid var(--surface); border-radius: 8px; padding: 0.8rem; max-height: 300px; overflow-y: auto; margin-bottom: 1.5rem; }
        .token-row { font-family: var(--font-mono); font-size: 0.52rem; padding: 0.2rem 0; border-bottom: 1px solid rgba(30,37,53,0.5); display: flex; justify-content: space-between; align-items: center; }
        .token-row:last-child { border-bottom: none; }
        .token-word { color: var(--pale); }
        .token-tags { display: flex; gap: 0.2rem; }
        .token-tag { font-size: 0.42rem; padding: 0.08rem 0.3rem; border-radius: 2px; }
        .tag-love { background: rgba(176,88,112,0.2); color: var(--love); }
        .tag-war { background: rgba(192,56,42,0.2); color: var(--war); }
        .tag-forge { background: rgba(192,112,64,0.2); color: var(--forge); }
        .tag-cult { background: rgba(122,106,64,0.2); color: var(--cultivation); }
        .tag-wild { background: rgba(90,128,80,0.2); color: var(--wild); }
        .tag-s { background: rgba(100,160,200,0.2); color: #7eb8da; }
        .tag-v { background: rgba(200,180,60,0.2); color: #c8a83c; }
        .tag-o { background: rgba(200,128,80,0.2); color: #c08050; }
        
        .log { background: #060810; border: 1px solid var(--surface); border-radius: 6px; padding: 0.5rem; max-height: 120px; overflow-y: auto; font-family: var(--font-mono); font-size: 0.5rem; color: var(--mist); }
        
        @media (max-width: 768px) { .domain-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>⚡ HER<span>MES</span></h1>
        <div class="header-sub">TOKEN COURIER · EMBED · TAG · SERVE · PYTHAGOREAN #1 · THE MONAD</div>
    </div>

    <div class="status-bar">
        <div>Tokens scraped: <span id="totalScraped">—</span></div>
        <div>In database: <span id="totalDB">—</span></div>
        <div>Model: <span id="modelStatus">loading...</span></div>
    </div>

    <div class="controls">
        <button id="scrapeBtn" class="primary" disabled>⚡ Scrape All Sources</button>
        <button id="loveBtn" disabled>💗 Love Sources</button>
        <button id="warBtn" disabled>⚔️ War Sources</button>
        <button id="generalBtn" disabled>🌐 General Sources</button>
    </div>

    <div class="domain-grid" id="domainGrid">
        <div class="domain-card love"><div class="domain-name" style="color:var(--love)">💗 LOVE</div><div class="domain-count" id="loveCount">—</div><div class="domain-god">→ Aphrodite</div></div>
        <div class="domain-card war"><div class="domain-name" style="color:var(--war)">⚔️ WAR</div><div class="domain-count" id="warCount">—</div><div class="domain-god">→ Ares</div></div>
        <div class="domain-card forge"><div class="domain-name" style="color:var(--forge)">🔨 FORGE</div><div class="domain-count" id="forgeCount">—</div><div class="domain-god">→ Hephaestus</div></div>
        <div class="domain-card cultivation"><div class="domain-name" style="color:var(--cultivation)">🌾 CULTIVATION</div><div class="domain-count" id="cultCount">—</div><div class="domain-god">→ Demeter</div></div>
        <div class="domain-card wild"><div class="domain-name" style="color:var(--wild)">🏹 WILD</div><div class="domain-count" id="wildCount">—</div><div class="domain-god">→ Artemis</div></div>
    </div>

    <div class="token-feed" id="tokenFeed"><div class="token-row"><span class="token-word">No tokens scraped yet</span></div></div>
    <div class="log" id="log"><div>⚡ Hermes ready.</div></div>

</div>

<script type="module">
const KAIROS_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
const KAIROS_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';
const sb = window.supabase.createClient(KAIROS_URL, KAIROS_KEY);

import { pipeline, env } from '@xenova/transformers';
env.allowLocalModels = true;
env.useBrowserCache = true;

let embedder = null;
let modelReady = false;
let totalScraped = 0;

const STOPWORDS = new Set(['the','and','for','with','this','that','from','have','are','was','were','how','why','what','when','where','who','which','there','their','they','them','then','than','about','into','through','during','before','after','above','below','between','under','very','just','but','not','you','your','our','its','has','had','been','being','can','will','would','could','should','might','like','because','while','since','also','only','more','most','some','such','these','those','own','same','make','take','come','goes','went','made','look','time','know','people','good','new','first','last','long','great','little','right','big','high','different','small','large','next','early','young','important','few','public','bad','able']);

// DOMAIN WORD LISTS
const DOMAINS = {
    love: new Set(['love','desire','beauty','passion','romance','heart','soul','kiss','embrace','union','wedding','devotion','adore','cherish','beloved','sweet','tender','gentle','soft','warm','bloom','flower','rose','garden','grace','elegant','radiant','luminous','golden','harmony','peace','kindness','joy','delight','pleasure','bliss','aphrodite','venus','eros','charm','attraction','allure','seduction','courtship','poetry','song','music','dance','art','beautiful']),
    war: new Set(['war','battle','fight','conflict','destruction','attack','defense','army','soldier','weapon','sword','spear','shield','armor','fortress','castle','siege','invasion','conquest','victory','defeat','slaughter','carnage','blood','death','kill','destroy','shatter','break','crush','burn','rage','fury','wrath','violence','force','power','domination','rival','enemy','opponent','competition','strife','discord','chaos','ares','mars','combat','assault','strike','clash']),
    forge: new Set(['forge','craft','build','create','make','tool','instrument','machine','engine','device','mechanism','structure','framework','architecture','system','design','construct','fabricate','assemble','forge','anvil','hammer','metal','iron','steel','fire','kiln','workshop','factory','industry','technology','engineer','artisan','hephaestus']),
    cultivation: new Set(['grow','cultivate','harvest','plant','seed','soil','earth','field','crop','grain','wheat','barley','fruit','vine','tree','root','branch','leaf','bloom','flower','garden','farm','agriculture','fertile','abundant','yield','reap','sow','tend','nurture','demeter','growth','cycle','season','spring','summer','autumn','fall','winter']),
    wild: new Set(['hunt','wild','wilderness','forest','mountain','beast','animal','prey','predator','track','trail','edge','boundary','frontier','unknown','undiscovered','hidden','secret','mystery','artemis','moon','night','shadow','bow','arrow','quiver','chase','pursuit','freedom','independence','solitary'])
};

const WORD_TYPES = {
    S: new Set(['love','heart','soul','beauty','desire','war','army','soldier','enemy','rival','forge','craftsman','artisan','engineer','earth','soil','garden','hunt','forest','beast','ai','model','system','network','agent','algorithm','pipeline','framework','protocol','fate','time','light','void','shadow','fire','water','phoenix','dragon','serpent','ouroboros','titan','god','goddess','muse','oracle','prophet','king','queen','warrior','hero']),
    V: new Set(['loves','adores','desires','embraces','kisses','holds','destroys','shatters','breaks','crushes','burns','kills','attacks','defends','forges','builds','creates','makes','crafts','grows','cultivates','harvests','plants','nurtures','hunts','tracks','pursues','finds','discovers','learns','predicts','generates','synthesizes','optimizes','processes','embeds','scores','filters','selects','routes','flows','rises','falls','binds','consumes','devours','awakens','transforms','emerges','resonates','becomes','shines','radiates','glows','weaves','tempers','elevates','converges','unravels','pierces','whispers','speaks','sings','calls']),
    O: new Set(['heart','soul','beauty','love','desire','passion','war','battle','conflict','destruction','peace','forge','tool','creation','artifact','harvest','crop','garden','wild','edge','frontier','pattern','signal','form','threshold','void','deep','shadow','flame','light','darkness','chaos','order','harmony','discord','resonance','echo','memory','dream','vision','prophecy','wisdom','knowledge','output','input','parameter','token','embedding','vector','matrix','model','network','graph','tree','forest','stream','pipeline','fate','destiny','thread','weave','tapestry','labyrinth','mandala'])
};

function classifyDomain(word) {
    const w = word.toLowerCase();
    for (const [domain, words] of Object.entries(DOMAINS)) {
        if (words.has(w)) return domain;
    }
    if (w.includes('lov') || w.includes('heart') || w.includes('soul')) return 'love';
    if (w.includes('war') || w.includes('batt') || w.includes('destro') || w.includes('strik')) return 'war';
    if (w.includes('forg') || w.includes('craft') || w.includes('build')) return 'forge';
    if (w.includes('grow') || w.includes('cult') || w.includes('harv')) return 'cultivation';
    if (w.includes('hunt') || w.includes('wild') || w.includes('edge')) return 'wild';
    return 'general';
}

function tagWordType(word) {
    const w = word.toLowerCase();
    if (WORD_TYPES.S.has(w)) return 'S';
    if (WORD_TYPES.V.has(w)) return 'V';
    if (WORD_TYPES.O.has(w)) return 'O';
    if (w.endsWith('s') || w.endsWith('er') || w.endsWith('or')) return 'S';
    if (w.endsWith('ed') || w.endsWith('ing') || w.endsWith('es')) return 'V';
    if (w.endsWith('ion') || w.endsWith('ment') || w.endsWith('ure')) return 'O';
    return '—';
}

function log(msg) {
    const el = document.getElementById('log');
    el.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + el.innerHTML;
}

async function loadModel() {
    try {
        document.getElementById('modelStatus').textContent = 'downloading...';
        embedder = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
        modelReady = true;
        document.getElementById('modelStatus').textContent = 'MiniLM ✓';
        enableButtons();
        log('MiniLM ready — tokens will be embedded.');
    } catch (err) {
        document.getElementById('modelStatus').textContent = 'offline';
        modelReady = false;
        enableButtons();
        log('Model failed — tokens stored without embeddings.');
    }
}

function enableButtons() {
    document.getElementById('scrapeBtn').disabled = false;
    document.getElementById('loveBtn').disabled = false;
    document.getElementById('warBtn').disabled = false;
    document.getElementById('generalBtn').disabled = false;
}

function extractTokens(text) {
    return text.toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w.length >= 4 && w.length <= 14 && !STOPWORDS.has(w));
}

async function embed(text) {
    if (!embedder) return null;
    const result = await embedder(text, { pooling: 'mean', normalize: true });
    return Array.from(result.data);
}

async function scrapeAndStore(sources, sourceLabel) {
    const allTokens = [];
    for (const src of sources) {
        try {
            const res = await fetch(src.url);
            const text = await res.text();
            // Very rough text extraction — handles RSS and plain text
            const clean = text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
            const tokens = extractTokens(clean);
            allTokens.push(...tokens.map(t => ({ word: t, source: src.name })));
        } catch (err) {
            log(`Source ${src.name}: offline`);
        }
    }

    const freq = new Map();
    allTokens.forEach(t => freq.set(t.word, (freq.get(t.word) || 0) + 1));
    const unique = [...freq.entries()].sort((a, b) => b[1] - a[1]).slice(0, 20);

    let stored = 0;
    for (const [word, count] of unique) {
        const domain = classifyDomain(word);
        const wordType = tagWordType(word);
        const embedding = modelReady ? await embed(word) : null;
        const score = Math.min(100, count * 6 + (domain !== 'general' ? 20 : 0));
        const expiresAt = new Date(Date.now() + 3 * 86400000);

        const { error } = await sb.from('concepts').insert({
            body: word, band: 'hermes', source: sourceLabel,
            source_loop: 'fast', state: 'raw', word_count: 1,
            word_type: wordType, domain: domain, score,
            metadata: { frequency: count, embedding },
            expires_at: expiresAt.toISOString(),
            created_at: new Date().toISOString(),
            gravity: 0, libations: 0, contests: 0
        });
        if (!error) stored++;
    }

    totalScraped += stored;
    document.getElementById('totalScraped').textContent = totalScraped;
    log(`${sourceLabel}: ${stored} tokens stored`);
    await updateStats();
    return stored;
}

const SOURCES = {
    love: [
        { url: 'https://poetryfoundation.org/feed', name: 'poetry' },
        { url: 'https://www.artsy.net/rss', name: 'artsy' }
    ],
    war: [
        { url: 'https://feeds.bbci.co.uk/news/world/rss.xml', name: 'bbc_world' },
        { url: 'https://www.aljazeera.com/xml/rss/all.xml', name: 'aljazeera' }
    ],
    general: [
        { url: 'https://hnrss.org/frontpage', name: 'hn' },
        { url: 'https://dev.to/feed', name: 'devto' }
    ]
};

async function scrapeAll() { await scrapeAndStore(SOURCES.general, 'general'); }
async function scrapeLove() { await scrapeAndStore(SOURCES.love, 'love'); }
async function scrapeWar() { await scrapeAndStore(SOURCES.war, 'war'); }
async function scrapeGeneral() { await scrapeAndStore(SOURCES.general, 'general'); }

async function updateStats() {
    for (const domain of ['love','war','forge','cultivation','wild']) {
        const { count } = await sb.from('concepts').select('*', { count: 'exact', head: true }).eq('domain', domain).eq('state', 'raw');
        document.getElementById(`${domain}Count`).textContent = count || 0;
    }
    const { count: total } = await sb.from('concepts').select('*', { count: 'exact', head: true }).eq('band', 'hermes');
    document.getElementById('totalDB').textContent = total || 0;
}

function renderFeed(tokens) {
    const feed = document.getElementById('tokenFeed');
    if (!tokens.length) { feed.innerHTML = '<div class="token-row"><span class="token-word">No tokens yet</span></div>'; return; }
    feed.innerHTML = tokens.map(t => `
        <div class="token-row">
            <span class="token-word">${t.word}</span>
            <span class="token-tags">
                <span class="token-tag tag-${t.domain}">${t.domain}</span>
                <span class="token-tag tag-${t.wordType?.toLowerCase() || '—'}">${t.wordType || '—'}</span>
            </span>
        </div>
    `).join('');
}

async function archiveSelf() {
    const html = document.documentElement.outerHTML;
    await sb.from('html').upsert({
        filename: 'hermes.html', title: '⚡ Hermes · Token Courier', type: 'chthonic',
        content: html, description: 'Scrapes sources, tags tokens by domain and word type, embeds with MiniLM, serves all gods',
        reads_from: [], writes_to: ['concepts'],
        models_used: ['Xenova/all-MiniLM-L6-v2'],
        url: window.location.href, updated_at: new Date().toISOString()
    }, { onConflict: 'filename' });
}

function init() {
    document.getElementById('scrapeBtn').onclick = scrapeAll;
    document.getElementById('loveBtn').onclick = scrapeLove;
    document.getElementById('warBtn').onclick = scrapeWar;
    document.getElementById('generalBtn').onclick = scrapeGeneral;
    loadModel();
    updateStats();
    setTimeout(archiveSelf, 3000);
    log('⚡ Hermes — Pythagorean #1, the Monad. Courier of tokens.');
}
init();
</script>
</body>
</html>
