<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Hermes · Token Courier</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap');
        :root {
            --void: #080a0f; --deep: #0b0e16; --surface: #1e2535;
            --gold: #c8943a; --hermes: #FFD700; --mist: #6a7a8a; --pale: #d4e0ed;
            --signal: #d4b84a; --love: #b05870; --war: #c0382a; --light: #d4a850;
            --farm: #7a6a40; --forge: #c07040; --crown: #5a7aaa; --tide: #3a7090;
            --wisdom: #6a8898; --storm: #9a8ac0; --wild: #5a8050; --vox: #8a4080;
            --font-display: 'Cinzel', serif; --font-body: 'Crimson Pro', serif; --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--void); font-family: var(--font-body); color: var(--pale); min-height: 100vh; }
        .topbar {
            display: flex; align-items: center; gap: 1rem;
            padding: 0.5rem 1.5rem; background: var(--deep);
            border-bottom: 1px solid var(--surface);
        }
        .topbar .logo { font-family: var(--font-display); color: var(--hermes); font-size: 1rem; }
        .topbar .telos { flex: 1; font-style: italic; font-size: 0.8rem; border-left: 1px solid var(--surface); padding-left: 1rem; }
        .topbar .telos.empty { color: var(--mist); }

        .main { display: flex; height: calc(100vh - 42px); }

        /* ── LEFT PANEL ── */
        .left { width: 380px; flex-shrink: 0; border-right: 1px solid var(--surface); padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
        .left h2 { font-family: var(--font-display); font-size: 0.8rem; color: var(--hermes); letter-spacing: 2px; }
        .left input {
            width: 100%; background: #060810; color: var(--pale);
            border: 1px solid var(--surface); padding: 0.5rem 0.7rem;
            font-family: var(--font-mono); font-size: 0.55rem; border-radius: 4px;
            outline: none;
        }
        .left input:focus { border-color: var(--hermes); }
        .left button {
            padding: 0.5rem; background: var(--hermes); color: var(--void);
            border: none; border-radius: 4px; cursor: pointer;
            font-family: var(--font-mono); font-size: 0.55rem; font-weight: bold;
        }
        .left button:disabled { opacity: 0.4; cursor: not-allowed; }
        .left button.secondary { background: var(--deep); color: var(--pale); border: 1px solid var(--surface); }
        .domain-stats { font-family: var(--font-mono); font-size: 0.45rem; color: var(--mist); }
        .domain-stats .row { display: flex; justify-content: space-between; padding: 0.15rem 0; }

        /* ── RIGHT PANEL: QUEUE ── */
        .right { flex: 1; padding: 1.5rem; overflow-y: auto; }
        .right h2 { font-family: var(--font-display); font-size: 0.8rem; color: var(--hermes); letter-spacing: 2px; margin-bottom: 0.3rem; }
        .right .hint { font-family: var(--font-mono); font-size: 0.4rem; color: var(--mist); margin-bottom: 1rem; }
        .queue-empty { color: var(--mist); font-style: italic; font-size: 0.55rem; text-align: center; padding: 3rem; }
        .queue-item {
            background: var(--deep); border: 1px solid var(--surface);
            border-radius: 6px; padding: 0.6rem 0.8rem; margin-bottom: 0.4rem;
            display: flex; align-items: center; gap: 0.6rem;
        }
        .queue-item .word {
            font-family: var(--font-mono); font-size: 0.6rem; color: var(--pale);
            min-width: 120px;
        }
        .queue-item .suggested {
            font-family: var(--font-mono); font-size: 0.38rem;
            padding: 0.1rem 0.4rem; border-radius: 3px;
            background: rgba(255,255,255,0.04); color: var(--mist);
        }
        .queue-item .suggested strong { color: var(--pale); }
        .queue-item select {
            background: #060810; color: var(--pale);
            border: 1px solid var(--surface); padding: 0.25rem 0.4rem;
            font-family: var(--font-mono); font-size: 0.45rem; border-radius: 3px;
            cursor: pointer;
        }
        .queue-item button {
            padding: 0.25rem 0.5rem; border: 1px solid var(--surface);
            background: transparent; color: var(--mist); border-radius: 3px;
            cursor: pointer; font-family: var(--font-mono); font-size: 0.4rem;
        }
        .queue-item button.confirm { border-color: #4ade80; color: #4ade80; }
        .queue-item button.confirm:hover { background: #4ade80; color: #000; }
        .queue-item button.skip { border-color: var(--mist); color: var(--mist); }
        .queue-item button.skip:hover { background: var(--mist); color: #000; }
        .queue-item .confidence {
            font-family: var(--font-mono); font-size: 0.38rem; color: var(--mist);
            min-width: 35px; text-align: right;
        }

        .log { font-family: var(--font-mono); font-size: 0.4rem; color: var(--mist); margin-top: 1rem; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="topbar">
    <span class="logo">⚡ HERMES</span>
    <span class="telos empty" id="telosText">Loading...</span>
</div>

<div class="main">

    <!-- LEFT: Hunt controls + stats -->
    <div class="left">
        <h2>⚡ HUNT URL</h2>
        <input type="url" id="urlInput" placeholder="https://example.com" autocomplete="off" />
        <button id="huntBtn">⚡ Hunt & Queue</button>
        <button class="secondary" id="seedBtn">🌱 Seed 12 Domains</button>

        <h2>📊 DOMAIN COUNTS</h2>
        <div class="domain-stats" id="domainStats">Loading...</div>

        <div class="log" id="log"></div>
    </div>

    <!-- RIGHT: Classification queue -->
    <div class="right">
        <h2>📋 CLASSIFICATION QUEUE</h2>
        <div class="hint">Words from URL hunts. Confirm or reclassify each one.</div>
        <div id="queueContainer">
            <div class="queue-empty">Hunt a URL to populate the queue.</div>
        </div>
    </div>

</div>

<script>
const sb = window.supabase.createClient(
  'https://kzcucjcyxybypncbdbws.supabase.co',
  'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw'
);
const HUNT_FN = 'https://kzcucjcyxybypncbdbws.supabase.co/functions/v1/hermes-hunt';

const DOMAINS = ['signal','love','war','light','farm','forge','crown','tide','wisdom','storm','wild','vox'];
const DOMAIN_SEEDS = {
  signal: ['message','signal','swift','path','word','code','cross','courier','speed','threshold'],
  love:   ['love','heart','desire','beauty','grace','embrace','bloom','devotion','soul','charm'],
  war:    ['battle','strike','blade','shield','rage','force','enemy','weapon','armor','clash'],
  light:  ['light','harmony','truth','vision','song','oracle','golden','radiant','clarity','beacon'],
  farm:   ['seed','harvest','soil','growth','field','earth','cultivate','root','bloom','cycle'],
  forge:  ['forge','hammer','fire','craft','tool','metal','build','shape','anvil','steel'],
  crown:  ['crown','throne','oath','legacy','memory','law','honor','blood','reign','covenant'],
  tide:   ['ocean','wave','tide','flow','depth','current','surge','abyss','water','storm'],
  wisdom: ['wisdom','knowledge','logic','reason','pattern','design','truth','mind','insight','strategy'],
  storm:  ['thunder','lightning','decree','order','power','authority','judgment','dominion','sky','command'],
  wild:   ['hunt','wild','moon','beast','forest','fang','claw','track','instinct','predator'],
  vox:    ['voice','utterance','echo','chant','breath','silence','scream','whisper','song','resonance']
};

let queue = []; // { word, suggested_domain, confidence }

function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + el.innerHTML;
}

// ── Telos ──
async function loadTelos() {
  const { data } = await sb.from('telos').select('statement').eq('is_active', true).maybeSingle();
  const el = document.getElementById('telosText');
  el.textContent = data?.statement ? '🎯 ' + data.statement : 'No active telos';
  el.classList.toggle('empty', !data?.statement);
}

// ── Domain stats ──
async function loadStats() {
  const stats = document.getElementById('domainStats');
  let html = '';
  for (const d of DOMAINS) {
    const { count } = await sb.from('tokens').select('*', { count: 'exact', head: true }).eq('domain', d);
    html += `<div class="row"><span>${d}</span><span>${count || 0}</span></div>`;
  }
  stats.innerHTML = html;
}

async function huntUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { log('⚠️ Enter a URL.'); return; }

  const btn = document.getElementById('huntBtn');
  btn.disabled = true; btn.textContent = 'Hunting...';
  log(`⚡ Hunting: ${url}`);

  try {
    const res = await fetch(HUNT_FN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const result = await res.json();

    if (!result.success) {
      log(`❌ ${result.error}`);
      btn.disabled = false; btn.textContent = '⚡ Hunt & Queue';
      return;
    }

    log(`📋 ${result.word_count} words extracted — checking against tokens...`);

    // Filter out words already in the tokens table
    const { data: existing } = await sb.from('tokens')
      .select('body')
      .in('body', result.words);
    const existingSet = new Set((existing || []).map(r => r.body));
    const novel = result.words.filter(w => !existingSet.has(w));

    // Add to queue with heuristic suggestions
    for (const word of novel) {
      const suggested = classifyLocal(word);
      queue.push({
        word,
        suggested_domain: suggested.domain,
        confidence: suggested.confidence
      });
    }

    log(`✅ ${queue.length} novel words queued.`);
    renderQueue();
  } catch (e) {
    log(`❌ Hunt failed: ${e.message}`);
  }

  btn.disabled = false; btn.textContent = '⚡ Hunt & Queue';
  document.getElementById('urlInput').value = '';
}

// ── Build queue from URL words ──
async function buildQueueFromUrl(url) {
  try {
    // Fetch text client-side via proxy
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxyUrl);
    const text = await res.text();
    const clean = text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    const words = [...new Set(
      clean.toLowerCase().match(/\b[a-z]{4,16}\b/g) || []
    )];

    // Get existing tokens to filter out already-classified words
    const { data: existing } = await sb.from('tokens').select('body').in('body', words.slice(0, 200));
    const existingSet = new Set((existing || []).map(r => r.body));
    const novel = words.filter(w => !existingSet.has(w)).slice(0, 30);

    // Add to queue with suggested domain
    for (const word of novel) {
      const suggested = classifyLocal(word);
      queue.push({
        word,
        suggested_domain: suggested.domain,
        confidence: suggested.confidence
      });
    }
  } catch (e) {
    log(`⚠️ Could not build queue: ${e.message}`);
  }
}

// ── Local heuristic classification (fast, for queue suggestions) ──
function classifyLocal(word) {
  // Check seed words
  for (const [domain, seeds] of Object.entries(DOMAIN_SEEDS)) {
    if (seeds.includes(word)) return { domain, confidence: 1.0 };
  }

  // Simple heuristics
  if (/^(code|data|web|net|api|dev|app|tech|cyber|server|client|protocol|function|module|object|array)$/.test(word)) return { domain: 'signal', confidence: 0.7 };
  if (/^(gentle|soft|warm|kind|caring|tender|dear|precious|beloved)$/.test(word)) return { domain: 'love', confidence: 0.7 };
  if (/^(attack|defend|assault|invade|dominate|overthrow|rebel|resist)$/.test(word)) return { domain: 'war', confidence: 0.7 };
  if (/^(river|lake|pond|stream|rain|flood|wave|shore|coast|reef)$/.test(word)) return { domain: 'tide', confidence: 0.7 };
  if (/^(animal|bird|wolf|bear|eagle|snake|deer|raven|crow|owl)$/.test(word)) return { domain: 'wild', confidence: 0.7 };
  if (/^(tree|plant|leaf|grass|vine|herb|spice|fruit|berry|nut)$/.test(word)) return { domain: 'farm', confidence: 0.7 };
  if (/^(speak|talk|say|tell|shout|yell|cry|laugh|sing|hum)$/.test(word)) return { domain: 'vox', confidence: 0.7 };
  if (/^(bright|dark|shadow|glow|shine|spark|flare|flash|beam)$/.test(word)) return { domain: 'light', confidence: 0.7 };
  if (/^(study|learn|teach|school|book|read|write|think)$/.test(word)) return { domain: 'wisdom', confidence: 0.7 };
  if (/^(make|craft|create|shape|form|mold|cast|weld)$/.test(word)) return { domain: 'forge', confidence: 0.7 };
  if (/^(govern|rule|reign|sovereign|emperor|kingdom|empire)$/.test(word)) return { domain: 'storm', confidence: 0.7 };
  if (/^(remember|forget|past|history|ancient|elder|ancestor)$/.test(word)) return { domain: 'crown', confidence: 0.7 };

  return { domain: 'signal', confidence: 0.3 };
}

// ── Confirm a word → store to tokens ──
async function confirmWord(index) {
  const item = queue[index];
  if (!item) return;

  const domain = document.getElementById(`domain-select-${index}`).value;

  const { error } = await sb.from('tokens').upsert({
    body: item.word,
    domain,
    word_type: 'S',
    score: Math.round(30 + item.confidence * 60),
    source: 'url-queue',
    created_at: new Date().toISOString()
  }, { onConflict: 'body' });

  if (error) {
    log(`❌ ${error.message}`);
  } else {
    log(`✅ ${item.word} → ${domain}`);
    queue.splice(index, 1);
    loadStats();
    renderQueue();
  }
}

// ── Skip a word ──
function skipWord(index) {
  queue.splice(index, 1);
  renderQueue();
}

// ── Confirm all ──
async function confirmAll() {
  for (let i = queue.length - 1; i >= 0; i--) {
    const item = queue[i];
    const { error } = await sb.from('tokens').upsert({
      body: item.word,
      domain: item.suggested_domain,
      word_type: 'S',
      score: Math.round(30 + item.confidence * 60),
      source: 'url-queue',
      created_at: new Date().toISOString()
    }, { onConflict: 'body' });

    if (!error) {
      log(`✅ ${item.word} → ${item.suggested_domain}`);
      queue.splice(i, 1);
    }
  }
  loadStats();
  renderQueue();
}

// ── Render queue ──
function renderQueue() {
  const container = document.getElementById('queueContainer');
  if (!queue.length) {
    container.innerHTML = '<div class="queue-empty">Queue empty. Hunt a URL to populate.</div>';
    return;
  }

  container.innerHTML = `
    <button class="secondary" onclick="confirmAll()" style="margin-bottom:0.8rem;">✅ Confirm All Suggestions</button>
    ${queue.map((item, i) => `
      <div class="queue-item">
        <span class="word">${item.word}</span>
        <span class="suggested">sugg: <strong>${item.suggested_domain}</strong></span>
        <span class="confidence">${Math.round(item.confidence * 100)}%</span>
        <select id="domain-select-${i}">
          ${DOMAINS.map(d => `<option value="${d}" ${d === item.suggested_domain ? 'selected' : ''}>${d}</option>`).join('')}
        </select>
        <button class="confirm" onclick="confirmWord(${i})">✓</button>
        <button class="skip" onclick="skipWord(${i})">✕</button>
      </div>
    `).join('')}
  `;
}

// ── Seed ──
async function seedDomains() {
  log('🌱 Seeding...');
  const batch = [];
  for (const [domain, words] of Object.entries(DOMAIN_SEEDS)) {
    for (const w of words) {
      batch.push({ body: w, domain, word_type: 'S', score: 85, source: 'seed', created_at: new Date().toISOString() });
    }
  }
  const { error } = await sb.from('tokens').upsert(batch, { onConflict: 'body' });
  if (error) { log(`❌ ${error.message}`); return; }
  log(`✅ Seeded ${batch.length} tokens`);
  loadStats();
}

// ── Init ──
loadTelos();
loadStats();
document.getElementById('huntBtn').onclick = huntUrl;
document.getElementById('seedBtn').onclick = seedDomains;
document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') huntUrl(); });
</script>
</body>
</html>
