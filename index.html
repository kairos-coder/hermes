<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes · Clean Ingestion Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0c12;
            font-family: 'SF Mono', 'Courier New', monospace;
            padding: 2rem;
            color: #d4e0ed;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #d4956a;
        }

        .sub {
            color: #6a7a8a;
            margin-bottom: 2rem;
            border-bottom: 1px solid #1e2535;
            padding-bottom: 0.5rem;
            font-size: 0.8rem;
        }

        .panel {
            background: #0b0e16;
            border: 1px solid #1e2535;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .panel h2 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #c9a84c;
            border-left: 2px solid #c9a84c;
            padding-left: 0.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #0f141e;
            border: 1px solid #1e2535;
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #d4956a;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #6a7a8a;
            text-transform: uppercase;
        }

        .log-area {
            background: #060810;
            border: 1px solid #1e2535;
            border-radius: 0.5rem;
            padding: 1rem;
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.75rem;
            font-family: monospace;
        }

        .log-entry {
            padding: 0.25rem 0;
            border-bottom: 1px solid #1a1f2a;
            color: #6a7a8a;
        }

        .log-entry.success {
            color: #6b8e23;
        }

        .log-entry.warning {
            color: #c9a84c;
        }

        .log-entry.error {
            color: #c0392b;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        button {
            background: #1e2535;
            border: none;
            color: #d4e0ed;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.75rem;
        }

        button:hover {
            background: #d4956a;
            color: #0a0c12;
        }

        .status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            background: #1a1f2a;
        }

        .status.active {
            background: #6b8e23;
            color: #0a0c12;
        }

        hr {
            border-color: #1e2535;
            margin: 0.5rem 0;
        }

        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .word-tag {
            background: #1a1f2a;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-family: monospace;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <h1>✈️ Hermes · Clean Ingestion Engine</h1>
    <div class="sub">Reddit (chaotic) · Hacker News (intellectual) · GitHub (builder) · Structured scarcity</div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-number" id="totalWords">—</div><div class="stat-label">Total Words</div></div>
        <div class="stat-card"><div class="stat-number" id="redditCount">—</div><div class="stat-label">Reddit</div></div>
        <div class="stat-card"><div class="stat-number" id="hnCount">—</div><div class="stat-label">Hacker News</div></div>
        <div class="stat-card"><div class="stat-number" id="githubCount">—</div><div class="stat-label">GitHub</div></div>
    </div>

    <div class="panel">
        <h2>⚙️ Controls</h2>
        <div class="button-group">
            <button id="scrapeBtn">🌊 Scrape Now (Reddit + HN + GitHub)</button>
            <button id="pruneBtn">🧹 Prune Expired (>7 days)</button>
            <button id="clearLogBtn">🗑️ Clear Log</button>
        </div>
        <div class="button-group">
            <span class="status" id="autoStatus">⏸ Auto-scrape off</span>
            <button id="autoToggleBtn">🤖 Toggle Auto-scrape (hourly)</button>
        </div>
        <div id="ingestLog" class="log-area">
            <div class="log-entry">Ready. Click "Scrape Now" to ingest from all three sources.</div>
        </div>
    </div>

    <div class="panel">
        <h2>📋 Recent Ingested Words</h2>
        <div id="recentWords" class="word-list">Loading...</div>
    </div>
</div>

<script>
    (function() {
        const SUPABASE_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';

        let supabase = null;
        let autoInterval = null;
        let autoEnabled = false;

        // STOPWORDS — aggressive filtering
        const STOPWORDS = new Set([
            'the','and','for','with','this','that','from','have','are','was','were','how','why',
            'what','when','where','who','which','there','their','they','them','then','than',
            'about','into','through','during','before','after','above','below','between','under',
            'very','just','but','not','you','your','our','its','has','had','been','being','can',
            'will','would','could','should','might','like','because','after','while','since'
        ]);

        // Source weights
        const SOURCE_WEIGHT = {
            reddit: 1.0,
            hn: 1.3,
            github: 1.5
        };

        // Clean token extraction from text
        function extractCleanTokens(text) {
            return text
                .toLowerCase()
                .replace(/[^a-z\s]/g, '')
                .split(/\s+/)
                .filter(w => w.length >= 3 && w.length <= 15 && !STOPWORDS.has(w));
        }

        // Simple word type detection (good enough)
        function detectWordType(word) {
            if (word.endsWith('ing') || word.endsWith('ed') || word.endsWith('es')) return 'verb';
            if (word.endsWith('al') || word.endsWith('ive') || word.endsWith('ous') || word.endsWith('ic')) return 'adj';
            if (word.endsWith('ly')) return 'adv';
            if (word.length > 0 && word[0] === word[0].toUpperCase() && word[0] !== word[0].toLowerCase()) return 'propn';
            return 'noun';
        }

        // Count frequency of words from a list
        function countFrequencies(words) {
            const freq = {};
            for (const w of words) {
                freq[w] = (freq[w] || 0) + 1;
            }
            return freq;
        }

        // Add log entry
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('ingestLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Fetch Reddit trending
        async function fetchReddit() {
            try {
                const response = await fetch('https://www.reddit.com/r/all/top.json?limit=50&t=day');
                const data = await response.json();
                const titles = data.data.children.map(c => c.data.title);
                const allTokens = titles.flatMap(t => extractCleanTokens(t));
                const freq = countFrequencies(allTokens);
                const sorted = Object.entries(freq).sort((a,b) => b[1] - a[1]).slice(0, 20);
                return sorted.map(([word, score]) => ({
                    word,
                    source: 'reddit',
                    score: Math.min(100, score * 10),
                    type: detectWordType(word)
                }));
            } catch (err) {
                addLog(`Reddit fetch failed: ${err.message}`, 'error');
                return [];
            }
        }

        // Fetch Hacker News trending
        async function fetchHackerNews() {
            try {
                const storyRes = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
                const storyIds = await storyRes.json();
                const topIds = storyIds.slice(0, 30);
                const stories = await Promise.all(
                    topIds.map(async (id) => {
                        const res = await fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`);
                        return res.json();
                    })
                );
                const titles = stories.filter(s => s && s.title).map(s => s.title);
                const allTokens = titles.flatMap(t => extractCleanTokens(t));
                const freq = countFrequencies(allTokens);
                const sorted = Object.entries(freq).sort((a,b) => b[1] - a[1]).slice(0, 15);
                return sorted.map(([word, score]) => ({
                    word,
                    source: 'hn',
                    score: Math.min(100, score * 10),
                    type: detectWordType(word)
                }));
            } catch (err) {
                addLog(`Hacker News fetch failed: ${err.message}`, 'error');
                return [];
            }
        }

        // Fetch GitHub topics
        async function fetchGitHub() {
            try {
                const response = await fetch('https://api.github.com/search/topics?q=stars:>100&per_page=30');
                const data = await response.json();
                const topics = data.items.map(item => item.name);
                const tokens = topics
                    .filter(t => !t.includes('-') && !t.includes('_') && t.length >= 3 && t.length <= 15)
                    .map(t => t.toLowerCase());
                const freq = countFrequencies(tokens);
                const sorted = Object.entries(freq).sort((a,b) => b[1] - a[1]).slice(0, 20);
                return sorted.map(([word, score]) => ({
                    word,
                    source: 'github',
                    score: Math.min(100, score * 20 + 10),
                    type: detectWordType(word)
                }));
            } catch (err) {
                addLog(`GitHub fetch failed: ${err.message}`, 'error');
                return [];
            }
        }

        // Check if word already exists (deduplication)
        async function wordExists(word, source) {
            const { data, error } = await supabase
                .from('hermes_entries')
                .select('id')
                .eq('body', word)
                .eq('source', source)
                .limit(1);
            
            if (error) return false;
            return data && data.length > 0;
        }

        // Add word to database
        async function addWord(wordData) {
            const exists = await wordExists(wordData.word, wordData.source);
            if (exists) {
                addLog(`⏭️ Skipped duplicate: ${wordData.word} (${wordData.source})`, 'warning');
                return false;
            }

            const expiresAt = new Date();
            expiresAt.setDate(expiresAt.getDate() + 7);
            const label = `${wordData.source}_${wordData.word}_${Date.now()}`;
            const weightedScore = Math.round(wordData.score * SOURCE_WEIGHT[wordData.source]);

            const { error } = await supabase
                .from('hermes_entries')
                .insert({
                    body: wordData.word,
                    label: label,
                    word_count: 1,
                    word_type: wordData.type,
                    source: wordData.source,
                    trending_score: weightedScore,
                    expires_at: expiresAt.toISOString()
                });

            if (error) {
                addLog(`❌ Failed to add ${wordData.word}: ${error.message}`, 'error');
                return false;
            }

            addLog(`✅ Added ${wordData.word} (${wordData.type}, ${wordData.source}, weight:${weightedScore})`, 'success');
            return true;
        }

        // Scrape all sources
        async function scrapeAll() {
            addLog('🌊 Starting scrape from all sources...', 'info');
            
            const [redditWords, hnWords, githubWords] = await Promise.all([
                fetchReddit(),
                fetchHackerNews(),
                fetchGitHub()
            ]);

            addLog(`📊 Found: Reddit ${redditWords.length}, HN ${hnWords.length}, GitHub ${githubWords.length}`, 'info');

            const allWords = [...redditWords, ...hnWords, ...githubWords];
            let added = 0;

            for (const word of allWords) {
                const success = await addWord(word);
                if (success) added++;
            }

            addLog(`🎯 Scrape complete. Added ${added} new words.`, 'success');
            await updateStats();
            await loadRecentWords();
        }

        // Prune expired words
        async function pruneExpired() {
            const { data, error } = await supabase
                .from('hermes_entries')
                .delete()
                .lt('expires_at', new Date().toISOString())
                .select();

            if (error) {
                addLog(`Prune failed: ${error.message}`, 'error');
            } else {
                addLog(`🧹 Pruned ${data?.length || 0} expired words (>7 days old)`, 'info');
            }
            await updateStats();
            await loadRecentWords();
        }

        // Update stats display
        async function updateStats() {
            const { data, error } = await supabase
                .from('hermes_entries')
                .select('source');

            if (error) return;

            const total = data.length;
            const reddit = data.filter(d => d.source === 'reddit').length;
            const hn = data.filter(d => d.source === 'hn').length;
            const github = data.filter(d => d.source === 'github').length;

            document.getElementById('totalWords').textContent = total;
            document.getElementById('redditCount').textContent = reddit;
            document.getElementById('hnCount').textContent = hn;
            document.getElementById('githubCount').textContent = github;
        }

        // Load recent words for display
        async function loadRecentWords() {
            const { data, error } = await supabase
                .from('hermes_entries')
                .select('body, source, word_type, trending_score')
                .order('created_at', { ascending: false })
                .limit(30);

            if (error) {
                document.getElementById('recentWords').innerHTML = `<div class="log-entry error">Error loading words</div>`;
                return;
            }

            if (!data || data.length === 0) {
                document.getElementById('recentWords').innerHTML = `<div class="log-entry">No words yet. Click "Scrape Now" to begin.</div>`;
                return;
            }

            document.getElementById('recentWords').innerHTML = data.map(w => `
                <span class="word-tag" title="${w.source} | ${w.word_type} | score:${w.trending_score}">
                    ${w.body}
                </span>
            `).join('');
        }

        // Auto-scrape toggle
        function startAutoScrape() {
            if (autoInterval) clearInterval(autoInterval);
            autoInterval = setInterval(async () => {
                addLog('🤖 Auto-scrape triggered (hourly)', 'info');
                await scrapeAll();
                await pruneExpired();
            }, 3600000);
            autoEnabled = true;
            document.getElementById('autoStatus').textContent = '▶ Auto-scrape on (hourly)';
            document.getElementById('autoStatus').classList.add('active');
            addLog('🤖 Auto-scrape enabled (hourly)', 'info');
        }

        function stopAutoScrape() {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
            }
            autoEnabled = false;
            document.getElementById('autoStatus').textContent = '⏸ Auto-scrape off';
            document.getElementById('autoStatus').classList.remove('active');
            addLog('⏸ Auto-scrape disabled', 'info');
        }

        // Clear log
        function clearLog() {
            const logDiv = document.getElementById('ingestLog');
            logDiv.innerHTML = '<div class="log-entry">Log cleared.</div>';
        }

        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('scrapeBtn').addEventListener('click', scrapeAll);
            document.getElementById('pruneBtn').addEventListener('click', pruneExpired);
            document.getElementById('clearLogBtn').addEventListener('click', clearLog);
            document.getElementById('autoToggleBtn').addEventListener('click', () => {
                if (autoEnabled) stopAutoScrape();
                else startAutoScrape();
            });
        }

        async function init() {
            if (!window.supabase) {
                console.error('Supabase not loaded');
                return;
            }
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            await updateStats();
            await loadRecentWords();
            setupEventListeners();
            addLog('🚀 Hermes ready. 3 sources: Reddit (chaotic), Hacker News (intellectual), GitHub (builder)', 'success');
        }

        init();
    })();
</script>
</body>
</html>
