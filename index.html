<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Hermes v5 · HTML Hunt</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@300;400;500&display=swap');
        :root {
            --void: #080a0f; --deep: #0b0e16; --surface: #1e2535;
            --gold: #c8943a; --hermes: #FFD700; --mist: #6a7a8a; --pale: #d4e0ed;
            --spawn: #4ade80; --incubating: #f0c060; --integrated: #8ab8c8;
            --font-display: 'Cinzel', serif; --font-body: 'Crimson Pro', serif; --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--void); font-family: var(--font-body); color: var(--pale); min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }

        .header { text-align: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--surface); }
        .header h1 { font-family: var(--font-display); font-size: 2rem; color: var(--hermes); letter-spacing: 3px; }
        .header-sub { font-family: var(--font-mono); font-size: 0.5rem; color: var(--mist); letter-spacing: 2px; margin-top: 0.3rem; }

        .status-bar { display: flex; gap: 2rem; justify-content: center; margin-bottom: 1.5rem; font-family: var(--font-mono); font-size: 0.55rem; color: var(--mist); flex-wrap: wrap; }
        .status-bar span { color: var(--pale); font-weight: 500; }
        .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 0.3rem; }
        .dot-live { background: var(--spawn); } .dot-off { background: #f87171; }

        .controls { display: flex; gap: 0.4rem; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
        button { font-family: var(--font-mono); font-size: 0.55rem; padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; border: 1px solid var(--surface); background: var(--deep); color: var(--pale); transition: all 0.2s; letter-spacing: 1px; }
        button:hover:not(:disabled) { background: var(--hermes); color: var(--void); border-color: var(--hermes); }
        button.primary { background: var(--hermes); color: var(--void); border-color: var(--hermes); }
        button.spawn { border-color: var(--spawn); color: var(--spawn); }
        button.spawn:hover:not(:disabled) { background: var(--spawn); color: var(--void); }
        button:disabled { opacity: 0.3; }

        .section { background: var(--deep); border: 1px solid var(--surface); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .section-title { font-family: var(--font-mono); font-size: 0.5rem; letter-spacing: 2px; color: var(--mist); margin-bottom: 0.8rem; }

        .repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 0.6rem; }
        .repo-card { background: var(--surface); border: 1px solid var(--surface); border-radius: 6px; padding: 0.8rem; transition: all 0.2s; cursor: pointer; }
        .repo-card:hover { border-color: var(--hermes); transform: translateY(-2px); }
        .repo-card.discovered { border-left: 2px solid var(--hermes); }
        .repo-card.incubating { border-left: 2px solid var(--incubating); }
        .repo-card.integrated { border-left: 2px solid var(--integrated); }
        .repo-name { font-family: var(--font-mono); font-size: 0.65rem; font-weight: 600; margin-bottom: 0.3rem; }
        .repo-desc { font-family: var(--font-body); font-size: 0.7rem; color: var(--mist); line-height: 1.3; margin-bottom: 0.4rem; }
        .repo-meta { font-family: var(--font-mono); font-size: 0.45rem; color: var(--mist); display: flex; gap: 0.8rem; }
        .repo-patterns { margin-top: 0.4rem; display: flex; gap: 0.3rem; flex-wrap: wrap; }
        .pattern-tag { font-family: var(--font-mono); font-size: 0.4rem; padding: 0.12rem 0.4rem; border-radius: 2px; background: rgba(74,222,128,0.12); color: var(--spawn); }
        .pattern-tag.incubating-tag { background: rgba(240,192,96,0.12); color: var(--incubating); }
        .pattern-tag.integrated-tag { background: rgba(138,184,200,0.12); color: var(--integrated); }

        .custom-hunt { display: flex; gap: 0.4rem; }
        .custom-hunt input { flex: 1; font-family: var(--font-mono); font-size: 0.55rem; padding: 0.4rem 0.6rem; background: var(--surface); border: 1px solid var(--surface); color: var(--pale); border-radius: 4px; }
        .custom-hunt input:focus { outline: none; border-color: var(--hermes); }

        .log { background: #060810; border: 1px solid var(--surface); border-radius: 4px; padding: 0.5rem; max-height: 120px; overflow-y: auto; font-family: var(--font-mono); font-size: 0.45rem; color: var(--mist); }

        @media (max-width: 768px) { .repo-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>⚡ HERMES v5</h1>
        <div class="header-sub">HTML HUNT · GITHUB REPO DISCOVERY → DEMETER SANDBOX</div>
    </div>

    <div class="status-bar">
        <div><span class="dot dot-live" id="edgeDot"></span> Edge: <span id="edgeStatus">checking</span></div>
        <div>Repos: <span id="repoCount">—</span></div>
        <div>Discovered: <span id="discoveredCount">—</span></div>
        <div>Incubating: <span id="incubatingCount">—</span></div>
    </div>

    <div class="controls">
        <button id="huntBtn" class="primary">🔍 Hunt GitHub</button>
        <button id="extractBtn">📥 Extract HTML</button>
        <button id="refreshBtn">🔄 Refresh</button>
    </div>

    <div class="section">
        <div class="section-title">🎯 CUSTOM HUNT</div>
        <div class="custom-hunt">
            <input type="text" id="customQuery" placeholder="e.g., generative art html canvas" />
            <button id="customHuntBtn">Hunt</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">📦 DISCOVERED REPOS</div>
        <div class="repo-grid" id="repoGrid">
            <div class="repo-card"><div class="repo-desc">No repos discovered yet. Click Hunt.</div></div>
        </div>
    </div>

    <div class="log" id="log">⚡ Hermes v5 ready. Hunts GitHub for HTML repos.</div>

</div>

<script type="module">
const EDGE_URL = 'https://kzcucjcyxybypncbdbws.supabase.co/functions/v1/hermes-extract';
const KAIROS_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
const KAIROS_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';
const sb = window.supabase.createClient(KAIROS_URL, KAIROS_KEY);

function log(msg) {
    const el = document.getElementById('log');
    el.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + el.innerHTML;
}

async function callEdge(payload) {
    try {
        const res = await fetch(EDGE_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
    } catch (err) { log(`Edge: ${err.message}`); return null; }
}

async function checkEdge() {
    const result = await callEdge({ action: 'status' });
    const dot = document.getElementById('edgeDot');
    const status = document.getElementById('edgeStatus');
    if (result?.success !== false) {
        dot.className = 'dot dot-live';
        status.textContent = 'live ✓';
    } else {
        dot.className = 'dot dot-off';
        status.textContent = 'offline';
    }
}

async function hunt(query = null) {
    log('🔍 Hunting GitHub...');
    const payload = { action: 'hunt' };
    if (query) payload.query = query;
    
    const result = await callEdge(payload);
    if (result?.success) {
        log(`✅ Found ${result.repos_found} repos · Stored ${result.stored}`);
        if (result.sample) {
            log(`   ${result.sample.join(', ')}`);
        }
    }
    await refresh();
}

async function extractAll() {
    const { data } = await sb.from('repos').select('url').eq('status', 'discovered').limit(10);
    if (!data?.length) { log('No repos to extract'); return; }
    
    log(`📥 Extracting HTML from ${data.length} repos...`);
    let extracted = 0;
    for (const r of data) {
        const result = await callEdge({ action: 'extract', url: r.url });
        if (result?.success && result.extracted) extracted++;
        await new Promise(r => setTimeout(r, 300));
    }
    log(`📥 Extracted HTML from ${extracted}/${data.length} repos → Demeter sandbox`);
    await refresh();
}

async function refresh() {
    const { data, count } = await sb.from('repos').select('*', { count: 'exact' }).order('score', { ascending: false }).limit(24);
    
    document.getElementById('repoCount').textContent = count || 0;
    document.getElementById('discoveredCount').textContent = data?.filter(r => r.status === 'discovered').length || 0;
    document.getElementById('incubatingCount').textContent = data?.filter(r => r.status === 'incubating' || r.status === 'integrated').length || 0;
    
    const grid = document.getElementById('repoGrid');
    if (!data?.length) {
        grid.innerHTML = '<div class="repo-card"><div class="repo-desc">No repos discovered yet. Click Hunt to search GitHub.</div></div>';
        return;
    }
    
    grid.innerHTML = data.map(r => {
        const statusClass = r.status === 'incubating' ? 'incubating' : r.status === 'integrated' ? 'integrated' : 'discovered';
        const patternClass = r.status === 'incubating' ? 'incubating-tag' : r.status === 'integrated' ? 'integrated-tag' : '';
        return `
            <div class="repo-card ${statusClass}" onclick="window.open('${r.url}', '_blank')">
                <div class="repo-name">📦 ${r.name || 'unknown'}</div>
                <div class="repo-desc">${r.description || 'No description'}</div>
                <div class="repo-meta">
                    <span>⭐ ${r.stars || 0}</span>
                    <span>🔧 ${r.language || 'html'}</span>
                    <span>📌 ${r.status || 'discovered'}</span>
                </div>
                ${(r.useful_patterns || []).length ? `
                <div class="repo-patterns">
                    ${r.useful_patterns.map(p => `<span class="pattern-tag ${patternClass}">${p}</span>`).join('')}
                </div>` : ''}
            </div>
        `;
    }).join('');
}

function init() {
    document.getElementById('huntBtn').onclick = () => hunt();
    document.getElementById('extractBtn').onclick = extractAll;
    document.getElementById('refreshBtn').onclick = refresh;
    document.getElementById('customHuntBtn').onclick = () => {
        const query = document.getElementById('customQuery').value.trim();
        if (query) hunt(query);
    };
    document.getElementById('customQuery').onkeydown = (e) => {
        if (e.key === 'Enter') {
            const query = e.target.value.trim();
            if (query) hunt(query);
        }
    };
    
    checkEdge();
    refresh();
    log('⚡ Hermes v5 · HTML Hunter. Searches GitHub for HTML repos.');
}
init();
</script>
</body>
</html>
