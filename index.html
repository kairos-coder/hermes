<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes · The Scraper · Kairos Content Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0c12;
            font-family: 'SF Mono', 'Courier New', monospace;
            padding: 2rem;
            color: #d4e0ed;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #d4956a;
        }

        .sub {
            color: #6a7a8a;
            margin-bottom: 2rem;
            border-bottom: 1px solid #1e2535;
            padding-bottom: 0.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #0f141e;
            border: 1px solid #1e2535;
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #d4956a;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #6a7a8a;
            text-transform: uppercase;
        }

        .panel {
            background: #0b0e16;
            border: 1px solid #1e2535;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .panel h2 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #c9a84c;
            border-left: 2px solid #c9a84c;
            padding-left: 0.5rem;
        }

        .filter-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: #1a1f2a;
            border: 1px solid #1e2535;
            color: #d4e0ed;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .filter-btn.active {
            background: #d4956a;
            color: #0a0c12;
        }

        .word-list {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .word-row {
            display: grid;
            grid-template-columns: 2fr 80px 100px 100px 80px 30px;
            gap: 0.5rem;
            align-items: center;
            padding: 0.4rem 0.6rem;
            background: #0f141e;
            border: 1px solid transparent;
            font-size: 0.75rem;
        }

        .word-row:hover {
            background: #1a1f2a;
            border-color: #1e2535;
        }

        .word-body {
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .word-type-select {
            background: #1a1f2a;
            border: 1px solid #1e2535;
            color: #d4e0ed;
            padding: 0.2rem 0.4rem;
            font-size: 0.7rem;
            font-family: monospace;
        }

        .save-btn {
            background: none;
            border: none;
            color: #6a7a8a;
            cursor: pointer;
            font-size: 1rem;
        }

        .save-btn:hover {
            color: #6b8e23;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #6a7a8a;
            cursor: pointer;
            font-size: 1rem;
        }

        .delete-btn:hover {
            color: #c0392b;
        }

        .trending-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .auto-run-control {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toggle-switch {
            width: 40px;
            height: 20px;
            background: #1a1f2a;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .toggle-switch.active {
            background: #6b8e23;
        }

        .toggle-switch::after {
            content: '';
            width: 16px;
            height: 16px;
            background: #d4e0ed;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: all 0.2s;
        }

        .toggle-switch.active::after {
            left: 22px;
        }

        .refresh-btn, .scrape-btn {
            background: #1e2535;
            border: none;
            color: #d4e0ed;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .refresh-btn:hover, .scrape-btn:hover {
            background: #d4956a;
            color: #0a0c12;
        }

        .suggestion-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .suggestion {
            background: #1e2535;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .suggestion:hover {
            background: #d4956a;
            color: #0a0c12;
        }

        .suggestion .type {
            font-size: 0.6rem;
            color: #6a7a8a;
            background: #0f141e;
            padding: 0.1rem 0.3rem;
            border-radius: 10px;
        }

        .suggestion .source {
            font-size: 0.6rem;
            color: #6a7a8a;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        input, select {
            background: #0f141e;
            border: 1px solid #1e2535;
            color: #d4e0ed;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: monospace;
        }

        input { flex: 2; min-width: 150px; }
        select { width: 120px; }

        button {
            background: #1e2535;
            border: none;
            color: #d4e0ed;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #d4956a;
            color: #0a0c12;
        }

        .feedback {
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #6a7a8a;
        }

        .feedback.success { color: #6b8e23; }
        .feedback.error { color: #c0392b; }
        .feedback.info { color: #c9a84c; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f141e; }
        ::-webkit-scrollbar-thumb { background: #1e2535; border-radius: 3px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <h1>✈️ Hermes · The Scraper</h1>
    <div class="sub">Trending words from the web · Auto-tagged · 7-day expiry</div>

    <!-- Stats Grid -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Control Panel -->
    <div class="panel">
        <div class="trending-header">
            <span>📡 Scrape trending words from:</span>
            <div class="auto-run-control">
                <span style="font-size:0.7rem;">🤖 Auto-scrape hourly</span>
                <div class="toggle-switch" id="autoRunToggle"></div>
                <button class="scrape-btn" id="scrapeNowBtn">⟳ Scrape Now</button>
            </div>
        </div>
        <div id="trendingWords" class="suggestion-grid">Click "Scrape Now" to fetch trending words...</div>
    </div>

    <!-- Hermes Lexicon -->
    <div class="panel">
        <h2>📋 Hermes Lexicon (Active Words)</h2>
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="noun">Nouns</button>
            <button class="filter-btn" data-filter="verb">Verbs</button>
            <button class="filter-btn" data-filter="adj">Adjectives</button>
            <button class="filter-btn" data-filter="adv">Adverbs</button>
            <button class="filter-btn" data-filter="pronoun">Pronouns</button>
            <button class="filter-btn" data-filter="conjunction">Conjunctions</button>
            <button class="filter-btn" data-filter="preposition">Prepositions</button>
            <button class="filter-btn" data-filter="det">Determiners</button>
            <button class="filter-btn" data-filter="propn">Proper Nouns</button>
            <button class="filter-btn" data-filter="expired">⚠️ Expired</button>
        </div>
        <div class="word-list" id="wordList">Loading...</div>
    </div>

    <!-- Manual Injection -->
    <div class="panel">
        <h2>✍️ Manual Word Injection</h2>
        <div class="input-group">
            <input type="text" id="newWord" placeholder="word (e.g., 'resonate')" autocomplete="off">
            <select id="newWordType">
                <option value="noun">Noun</option>
                <option value="verb">Verb</option>
                <option value="adj">Adjective</option>
                <option value="adv">Adverb</option>
                <option value="pronoun">Pronoun</option>
                <option value="conjunction">Conjunction</option>
                <option value="preposition">Preposition</option>
                <option value="det">Determiner</option>
                <option value="propn">Proper Noun</option>
            </select>
            <select id="newSource">
                <option value="manual">Manual</option>
                <option value="reddit">Reddit</option>
                <option value="hn">Hacker News</option>
                <option value="github">GitHub</option>
            </select>
            <button id="addWordBtn">Inject</button>
        </div>
        <div class="feedback" id="manualFeedback"></div>
    </div>
</div>

<script>
    (function() {
        const SUPABASE_URL = 'https://kzcucjcyxybypncbdbws.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_saeUHGocDah-T2_709M6Fg_g26JtLXw';

        let supabase = null;
        let currentEntries = [];
        let currentFilter = 'all';
        let autoRunEnabled = false;
        let autoRunInterval = null;

        // Word type detection
        function detectWordType(word) {
            const w = word.toLowerCase();
            
            const pronouns = ['i', 'you', 'he', 'she', 'it', 'we', 'they', 'me', 'him', 'her', 'us', 'them', 'my', 'your', 'his', 'her', 'its', 'our', 'their'];
            if (pronouns.includes(w)) return 'pronoun';
            
            const conjunctions = ['and', 'or', 'but', 'so', 'for', 'nor', 'yet', 'because', 'although', 'whereas', 'unless', 'while', 'since', 'if', 'then', 'than'];
            if (conjunctions.includes(w)) return 'conjunction';
            
            const prepositions = ['in', 'on', 'at', 'for', 'with', 'without', 'by', 'to', 'from', 'of', 'about', 'through', 'across', 'between', 'among', 'against', 'during', 'before', 'after', 'above', 'below', 'under', 'over', 'like', 'than'];
            if (prepositions.includes(w)) return 'preposition';
            
            const determiners = ['the', 'a', 'an', 'this', 'that', 'these', 'those', 'some', 'any', 'no', 'every', 'each', 'all', 'both', 'neither', 'either'];
            if (determiners.includes(w)) return 'det';
            
            if (w.endsWith('ly')) return 'adv';
            
            if (w.endsWith('ing') || w.endsWith('ed') || w.endsWith('es')) {
                const verbEndings = ['ize', 'ise', 'ify', 'ate', 'en'];
                for (let ending of verbEndings) {
                    if (w.endsWith(ending)) return 'verb';
                }
            }
            
            const commonVerbs = ['is', 'are', 'was', 'were', 'be', 'been', 'being', 'has', 'have', 'had', 'do', 'does', 'did', 'doing'];
            if (commonVerbs.includes(w)) return 'verb';
            
            if (w.length > 0 && w[0] === w[0].toUpperCase() && w[0] !== w[0].toLowerCase()) {
                return 'propn';
            }
            
            return 'noun';
        }

        // Trending word fetchers
        async function fetchRedditTrending() {
            try {
                const response = await fetch('https://www.reddit.com/r/all/top.json?limit=50&t=day');
                const data = await response.json();
                const titles = data.data.children.map(child => child.data.title);
                const allWords = titles.join(' ').toLowerCase().split(/\s+/);
                const filtered = allWords.filter(w => w.length >= 3 && w.length <= 12 && /^[a-z]+$/.test(w));
                const freq = {};
                filtered.forEach(w => freq[w] = (freq[w] || 0) + 1);
                const sorted = Object.entries(freq).sort((a,b) => b[1] - a[1]).slice(0, 20);
                return sorted.map(([word, score]) => ({ word, source: 'reddit', score, type: detectWordType(word) }));
            } catch (err) {
                console.error('Reddit fetch failed:', err);
                return [];
            }
        }

        async function fetchHackerNewsTrending() {
            try {
                const storyRes = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
                const storyIds = await storyRes.json();
                const topIds = storyIds.slice(0, 30);
                const stories = await Promise.all(
                    topIds.map(async (id) => {
                        const res = await fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`);
                        return res.json();
                    })
                );
                const titles = stories.filter(s => s && s.title).map(s => s.title);
                const allWords = titles.join(' ').toLowerCase().split(/\s+/);
                const filtered = allWords.filter(w => w.length >= 3 && w.length <= 12 && /^[a-z]+$/.test(w));
                const freq = {};
                filtered.forEach(w => freq[w] = (freq[w] || 0) + 1);
                const sorted = Object.entries(freq).sort((a,b) => b[1] - a[1]).slice(0, 15);
                return sorted.map(([word, score]) => ({ word, source: 'hn', score, type: detectWordType(word) }));
            } catch (err) {
                console.error('Hacker News fetch failed:', err);
                return [];
            }
        }

        async function fetchGitHubTopics() {
            try {
                const response = await fetch('https://api.github.com/search/topics?q=stars:>100&per_page=30');
                const data = await response.json();
                const topics = data.items.map(item => item.name);
                const singleWords = topics.filter(t => !t.includes('-') && !t.includes('_') && t.length > 2 && t.length < 15);
                return singleWords.map(word => ({ word, source: 'github', score: 1, type: detectWordType(word) }));
            } catch (err) {
                console.error('GitHub fetch failed:', err);
                return [];
            }
        }

        async function fetchAllTrending() {
            const trendingDiv = document.getElementById('trendingWords');
            trendingDiv.innerHTML = '<div class="feedback info">🔄 Fetching trending words from Reddit, Hacker News, and GitHub...</div>';
            
            try {
                const [redditWords, hnWords, githubWords] = await Promise.all([
                    fetchRedditTrending(),
                    fetchHackerNewsTrending(),
                    fetchGitHubTopics()
                ]);
                
                const allWords = [...redditWords, ...hnWords, ...githubWords];
                const unique = {};
                allWords.forEach(w => { if (!unique[w.word] || unique[w.word].score < w.score) unique[w.word] = w; });
                const displayWords = Object.values(unique).slice(0, 40);
                
                if (displayWords.length === 0) {
                    trendingDiv.innerHTML = '<div class="feedback info">No new trending words found</div>';
                    return [];
                }
                
                trendingDiv.innerHTML = displayWords.map(w => `
                    <div class="suggestion" onclick="addTrendingWord('${escapeHtml(w.word)}', '${w.type}', '${w.source}', ${w.score})">
                        <span>${escapeHtml(w.word)}</span>
                        <span class="type">${w.type}</span>
                        <span class="source">${w.source}</span>
                        <span class="source">🔥 ${w.score}</span>
                    </div>
                `).join('');
                
                return displayWords;
            } catch (err) {
                trendingDiv.innerHTML = '<div class="feedback error">Failed to fetch trending words</div>';
                console.error(err);
                return [];
            }
        }

        window.addTrendingWord = async function(word, wordType, source, score) {
            const feedback = document.getElementById('manualFeedback');
            const label = `${source}_${word}_${Date.now()}`;
            const expiresAt = new Date();
            expiresAt.setDate(expiresAt.getDate() + 7);
            
            try {
                const { error } = await supabase
                    .from('hermes_entries')
                    .insert({ 
                        body: word, 
                        label: label, 
                        word_count: word.split(/\s+/).length,
                        word_type: wordType,
                        source: source,
                        trending_score: score,
                        expires_at: expiresAt.toISOString()
                    });

                if (error) throw error;
                feedback.innerHTML = `✓ Added "${word}" as ${wordType} from ${source}`;
                feedback.className = 'feedback success';
                await loadData();
                setTimeout(() => feedback.innerHTML = '', 3000);
            } catch (err) {
                feedback.innerHTML = `✗ Failed to add "${word}": ${err.message}`;
                feedback.className = 'feedback error';
                setTimeout(() => feedback.innerHTML = '', 3000);
            }
        };

        async function pruneExpired() {
            const { data, error } = await supabase
                .from('hermes_entries')
                .delete()
                .lt('expires_at', new Date().toISOString());
            
            if (error) {
                console.error('Prune failed:', error);
            } else {
                console.log('🧹 Pruned expired entries');
            }
            await loadData();
        }

        async function loadData() {
            const { data, error } = await supabase
                .from('hermes_entries')
                .select('id, body, word_count, word_type, source, trending_score, expires_at, created_at')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error loading data:', error);
                document.getElementById('wordList').innerHTML = `<div class="feedback error">Error: ${error.message}</div>`;
                return;
            }

            currentEntries = data || [];
            updateStats();
            displayWordList();
        }

        function updateStats() {
            const stats = {
                total: currentEntries.length,
                noun: 0, verb: 0, adj: 0, adv: 0, pronoun: 0, conjunction: 0, preposition: 0, det: 0, propn: 0,
                bySource: { reddit: 0, hn: 0, github: 0, manual: 0 }
            };
            
            currentEntries.forEach(entry => {
                const type = entry.word_type || 'noun';
                if (stats[type] !== undefined) stats[type]++;
                
                const source = entry.source || 'manual';
                if (stats.bySource[source] !== undefined) stats.bySource[source]++;
            });
            
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card"><div class="stat-number">${stats.total}</div><div class="stat-label">Total</div></div>
                <div class="stat-card"><div class="stat-number">${stats.noun}</div><div class="stat-label">Nouns</div></div>
                <div class="stat-card"><div class="stat-number">${stats.verb}</div><div class="stat-label">Verbs</div></div>
                <div class="stat-card"><div class="stat-number">${stats.adj}</div><div class="stat-label">Adjectives</div></div>
                <div class="stat-card"><div class="stat-number">${stats.adv}</div><div class="stat-label">Adverbs</div></div>
                <div class="stat-card"><div class="stat-number">${stats.propn}</div><div class="stat-label">Proper</div></div>
                <div class="stat-card"><div class="stat-number">${stats.bySource.reddit}</div><div class="stat-label">Reddit</div></div>
                <div class="stat-card"><div class="stat-number">${stats.bySource.hn}</div><div class="stat-label">HN</div></div>
                <div class="stat-card"><div class="stat-number">${stats.bySource.github}</div><div class="stat-label">GitHub</div></div>
            `;
        }

        function displayWordList() {
            const container = document.getElementById('wordList');
            let filtered = [...currentEntries];
            
            if (currentFilter !== 'all') {
                if (currentFilter === 'expired') {
                    filtered = filtered.filter(entry => new Date(entry.expires_at) < new Date());
                } else {
                    filtered = filtered.filter(entry => (entry.word_type || 'noun') === currentFilter);
                }
            } else {
                filtered = filtered.filter(entry => new Date(entry.expires_at) > new Date());
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="feedback">No entries found</div>';
                return;
            }
            
            container.innerHTML = filtered.map(entry => `
                <div class="word-row">
                    <div class="word-body">${escapeHtml(entry.body)}</div>
                    <div>${entry.word_count || 1}w</div>
                    <div style="color: #6a7a8a;">${entry.word_type || 'noun'}</div>
                    <div style="color: #6a7a8a;">${entry.source || 'manual'}</div>
                    <div style="font-size:0.65rem;">🔥 ${entry.trending_score || 1}</div>
                    <button class="delete-btn" data-id="${entry.id}">🗑️</button>
                </div>
            `).join('');
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    const { error } = await supabase.from('hermes_entries').delete().eq('id', id);
                    if (error) {
                        const fb = document.getElementById('manualFeedback');
                        fb.innerHTML = `✗ Delete failed: ${error.message}`;
                        fb.className = 'feedback error';
                        setTimeout(() => fb.innerHTML = '', 3000);
                    } else {
                        await loadData();
                    }
                });
            });
        }

        async function scrapeAndAddAll() {
            const words = await fetchAllTrending();
            let added = 0;
            for (const w of words) {
                const expiresAt = new Date();
                expiresAt.setDate(expiresAt.getDate() + 7);
                const label = `${w.source}_${w.word}_${Date.now()}`;
                const { error } = await supabase
                    .from('hermes_entries')
                    .insert({ 
                        body: w.word, 
                        label: label, 
                        word_count: 1,
                        word_type: w.type,
                        source: w.source,
                        trending_score: w.score,
                        expires_at: expiresAt.toISOString()
                    })
                    .select();
                if (!error) added++;
            }
            const feedback = document.getElementById('manualFeedback');
            feedback.innerHTML = `✓ Scraped and added ${added} new words`;
            feedback.className = 'feedback success';
            await loadData();
            setTimeout(() => feedback.innerHTML = '', 3000);
        }

        function startAutoRun() {
            if (autoRunInterval) clearInterval(autoRunInterval);
            autoRunInterval = setInterval(async () => {
                console.log('🔄 Hermes auto-scrape running...');
                await scrapeAndAddAll();
                await pruneExpired();
            }, 3600000); // every hour
            autoRunEnabled = true;
            document.getElementById('autoRunToggle').classList.add('active');
        }

        function stopAutoRun() {
            if (autoRunInterval) {
                clearInterval(autoRunInterval);
                autoRunInterval = null;
            }
            autoRunEnabled = false;
            document.getElementById('autoRunToggle').classList.remove('active');
        }

        function setupEventListeners() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    displayWordList();
                });
            });
            
            document.getElementById('scrapeNowBtn').addEventListener('click', scrapeAndAddAll);
            
            document.getElementById('autoRunToggle').addEventListener('click', () => {
                if (autoRunEnabled) stopAutoRun();
                else startAutoRun();
            });
            
            document.getElementById('addWordBtn').addEventListener('click', async () => {
                const word = document.getElementById('newWord').value.trim();
                const wordType = document.getElementById('newWordType').value;
                const source = document.getElementById('newSource').value;
                const feedback = document.getElementById('manualFeedback');
                
                if (!word) {
                    feedback.innerHTML = '✗ Word required';
                    feedback.className = 'feedback error';
                    setTimeout(() => feedback.innerHTML = '', 3000);
                    return;
                }
                
                const expiresAt = new Date();
                expiresAt.setDate(expiresAt.getDate() + 7);
                const label = `manual_${word}_${Date.now()}`;
                
                try {
                    const { error } = await supabase
                        .from('hermes_entries')
                        .insert({ 
                            body: word, 
                            label: label, 
                            word_count: word.split(/\s+/).length,
                            word_type: wordType,
                            source: source,
                            trending_score: 1,
                            expires_at: expiresAt.toISOString()
                        });
                    
                    if (error) throw error;
                    feedback.innerHTML = `✓ Injected "${word}" as ${wordType}`;
                    feedback.className = 'feedback success';
                    document.getElementById('newWord').value = '';
                    await loadData();
                    setTimeout(() => feedback.innerHTML = '', 3000);
                } catch (err) {
                    feedback.innerHTML = `✗ Failed: ${err.message}`;
                    feedback.className = 'feedback error';
                    setTimeout(() => feedback.innerHTML = '', 3000);
                }
            });
            
            setInterval(async () => {
                await pruneExpired();
            }, 3600000); // prune every hour
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
        }

        async function init() {
            if (!window.supabase) {
                console.error('Supabase not loaded');
                return;
            }
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            await loadData();
            setupEventListeners();
            await pruneExpired();
        }

        init();
    })();
</script>
</body>
</html>
